  <path d="M325 415c-58 0-104-47-104-105s46-105 104-105 104 47 104 105-46 105-104 105z" fill="#d8d1c5"/>
  <path d="M242 222l-44-70 88 33zm166 0l44-70-88 33z" fill="#d8d1c5"/>
