<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">고양이 복숭아 급여 가능 부위 안내</title>
  <desc id="desc">복숭아 과육만 소량 가능하고 씨와 껍질은 주의해야 한다는 안내</desc>
  <rect width="1200" height="675" fill="#fff1ec"/>
  <text x="80" y="95" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#21483c">고양이 복숭아 급여 부위</text>
  <rect x="80" y="145" width="310" height="380" rx="22" fill="#ffc0a0"/>
  <text x="120" y="230" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#21483c">과육</text>
  <text x="120" y="290" font-family="Arial, sans-serif" font-size="28" fill="#21483c">아주 소량 가능</text>
  <text x="120" y="345" font-family="Arial, sans-serif" font-size="24" fill="#5f6b63">씨 제거 후 작게</text>
  <rect x="445" y="145" width="310" height="380" rx="22" fill="#f2d0bd"/>
  <text x="485" y="230" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#7d3928">씨</text>
  <text x="485" y="290" font-family="Arial, sans-serif" font-size="28" fill="#7d3928">절대 금지</text>
  <text x="485" y="345" font-family="Arial, sans-serif" font-size="24" fill="#5f6b63">치아·목 걸림·장 막힘 위험</text>
  <rect x="810" y="145" width="310" height="380" rx="22" fill="#fff7f2"/>
  <text x="850" y="230" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#21483c">껍질</text>
  <text x="850" y="290" font-family="Arial, sans-serif" font-size="28" fill="#21483c">제거 권장</text>
  <text x="850" y="345" font-family="Arial, sans-serif" font-size="24" fill="#5f6b63">처음 급여 시 더 안전</text>
  <text x="80" y="595" font-family="Arial, sans-serif" font-size="26" fill="#5f6b63">복숭아는 씨 관리가 가장 중요합니다.</text>
</svg>
