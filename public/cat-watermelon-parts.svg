<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">고양이 수박 급여 가능 부위 안내</title>
  <desc id="desc">고양이에게 수박 과육만 소량 급여하고 씨와 껍질은 제거해야 한다는 안내</desc>
  <rect width="1200" height="675" fill="#f1faf2"/>
  <text x="80" y="95" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#21483c">고양이 수박 급여 부위</text>
  <rect x="80" y="145" width="310" height="380" rx="22" fill="#ff8078"/>
  <text x="120" y="230" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">빨간 과육</text>
  <text x="120" y="290" font-family="Arial, sans-serif" font-size="28" fill="#ffffff">소량 가능</text>
  <text x="120" y="345" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">씨 제거 후 작게 자르기</text>
  <rect x="445" y="145" width="310" height="380" rx="22" fill="#fff0ee"/>
  <text x="485" y="230" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#8f2d27">씨</text>
  <text x="485" y="290" font-family="Arial, sans-serif" font-size="28" fill="#8f2d27">제거</text>
  <text x="485" y="345" font-family="Arial, sans-serif" font-size="24" fill="#5f6b63">소화 부담 예방</text>
  <rect x="810" y="145" width="310" height="380" rx="22" fill="#d9edc8"/>
  <text x="850" y="230" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#21483c">껍질</text>
  <text x="850" y="290" font-family="Arial, sans-serif" font-size="28" fill="#21483c">급여하지 않음</text>
  <text x="850" y="345" font-family="Arial, sans-serif" font-size="24" fill="#5f6b63">질기고 단단함</text>
  <text x="80" y="595" font-family="Arial, sans-serif" font-size="26" fill="#5f6b63">수박은 물을 대신하지 않습니다. 수분 관리는 물과 식단이 기본입니다.</text>
</svg>
